services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paycore
      POSTGRES_PASSWORD: paycore
      POSTGRES_DB: paycore
    ports:
      - "5432:5432"
    volumes:
      - paycore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycore"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://paycore:paycore@db:5432/paycore
      SECRET_KEY: dev-secret-key-change-in-production
      ADMIN_API_KEY: dev-admin-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  paycore_pgdata:
