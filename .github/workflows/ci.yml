name: CI

# CI roda em PR (gate de revisao) e apos merge em main (verificacao pos-merge).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install ruff black mypy
      - name: Ruff
        run: ruff check app/ tests/
      - name: Black
        run: black --check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paycore
          POSTGRES_PASSWORD: paycore
          POSTGRES_DB: paycore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paycore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://paycore:paycore@localhost:5432/paycore_test
        run: pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
